<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Passwort testen</title>

<style>
  /* Hintergrund mit animiertem Farbverlauf */
  body {
    background: linear-gradient(135deg, #6a11cb, #2575fc);
    background-size: 300% 300%;
    animation: gradientMove 12s ease infinite;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    height: 100vh;
    margin: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #fff;
  }

  @keyframes gradientMove {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
  }

  /* Glas-Effekt Container */
  .container {
    background: rgba(255, 255, 255, 0.12);
    padding: 45px 60px;
    border-radius: 18px;
    backdrop-filter: blur(14px);
    -webkit-backdrop-filter: blur(14px);
    box-shadow: 0 12px 40px rgba(0, 0, 0, 0.25);
    width: 340px;
    text-align: center;
    border: 1px solid rgba(255, 255, 255, 0.25);
    animation: fadeIn 1s ease forwards;
    transform: translateY(20px);
    opacity: 0;
  }

  @keyframes fadeIn {
    to {
      transform: translateY(0);
      opacity: 1;
    }
  }

  h2 {
    margin-bottom: 26px;
    font-weight: 600;
    letter-spacing: 0.5px;
    text-shadow: 0 2px 6px rgba(0,0,0,0.3);
  }

  /* Input-Feld */
  input[type="text"] {
    width: 100%;
    padding: 14px 18px;
    border-radius: 10px;
    border: none;
    outline: none;
    font-size: 1rem;
    margin-bottom: 26px;
    box-sizing: border-box;
    background: rgba(255,255,255,0.25);
    color: #fff;
    font-weight: 500;
    transition: all 0.25s ease;
    backdrop-filter: blur(4px);
  }

  input[type="text"]::placeholder {
    color: rgba(255,255,255,0.7);
  }

  input[type="text"]:focus {
    background: rgba(255,255,255,0.35);
    box-shadow: 0 0 0 3px rgba(255,255,255,0.35);
  }

  /* Button */
  button {
    background: linear-gradient(135deg, #5a67d8, #805ad5);
    border: none;
    color: white;
    padding: 14px 0;
    width: 100%;
    font-size: 1.1rem;
    border-radius: 10px;
    cursor: pointer;
    font-weight: 600;
    transition: all 0.3s ease;
    box-shadow: 0 6px 18px rgba(0,0,0,0.25);
  }

  button:hover {
    background: linear-gradient(135deg, #434190, #6b46c1);
    transform: translateY(-2px);
    box-shadow: 0 10px 24px rgba(0,0,0,0.3);
  }

  #result {
    margin-top: 22px;
    font-size: 1.15rem;
    font-weight: 600;
    text-shadow: 0 2px 6px rgba(0,0,0,0.3);
  }
</style>
</head>

<body>
  <div class="container">
    <h2>Passwort eingeben</h2>
    <form onsubmit="return checkPassword(event)">
      <input type="text" id="password" placeholder="Passwort" autocomplete="off" autofocus />
      <button type="submit">Einloggen</button>
    </form>
    <p id="result"></p>
  </div>

  <script>
    function checkPassword(event) {
      event.preventDefault();
      const pw = document.getElementById('password').value.trim();
      const result = document.getElementById('result');

      if (pw === 'hah') {
        result.textContent = '✅ Passwort korrekt!';
        result.style.color = '#48bb78';
      } else {
        result.textContent = '❌ Falsches Passwort.';
        result.style.color = '#f56565';
      }
    }
  </script>
</body>
</html>
